name: CI / CD

on:
  push:
    branches: [main, demo]
  pull_request:
    branches: [main, demo]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Backend: typecheck · unit tests · dep audit
  # ──────────────────────────────────────────────
  backend:
    name: Backend — typecheck · test · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: backend

      - name: Unit tests
        run: npm test
        working-directory: backend

      # Non-blocking: shows audit output without failing the build.
      # Change continue-on-error to false to enforce strict dependency hygiene.
      - name: Dependency audit
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true

  # ──────────────────────────────────────────────────────
  # 2. Frontend: typecheck · lint · unit tests · dep audit
  # ──────────────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck · lint · test · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        run: npm test
        working-directory: frontend

      - name: Dependency audit
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  # ──────────────────────────────────────────────────────
  # 3. E2E: Playwright smoke tests (critical paths only)
  #    Starts the backend in dev mode + lets Playwright
  #    spawn the Vite dev server via webServer config.
  # ──────────────────────────────────────────────────────
  e2e:
    name: E2E — Playwright smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start backend (dev mode, ephemeral DB)
        run: npx tsx src/server.ts &
        working-directory: backend
        env:
          DATABASE_URL: /tmp/securevault-ci.db
          PORT: 3000
          NODE_ENV: test
          COOKIE_SECRET: ci-test-dummy-secret-32-chars-min!

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend on :3000…"
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null 2>&1 && echo "Ready." && break
            sleep 2
          done

      - name: Run smoke tests
        run: npm run test:e2e:smoke
        working-directory: frontend
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 4. Production build (backend tsc + vite build)
  # ──────────────────────────────────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # 5. Docker: build locally → Trivy CRITICAL scan → push to GHCR
  #    Only runs on push to main after all checks pass.
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Build · Scan · Push Docker image
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # Build into local daemon first so Trivy can scan before any push.
      - name: Build image (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: securevault:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fail fast on CRITICAL CVEs in OS packages or libraries.
      # Unfixed vulnerabilities are ignored (no available patch).
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: securevault:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      # Second build uses GHA layer cache — effectively instant.
      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # (OPTIONAL) DAST: dynamic security test against live backend.
  # Uncomment and configure once a stable seeded CI environment
  # exists. Requires DATABASE_URL with an admin account seeded.
