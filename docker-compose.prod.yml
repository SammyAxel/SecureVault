# ============================================
# SecureVault - Self-hosted Production Setup
# ============================================
#
# Quick start:
#   docker compose -f docker-compose.prod.yml up -d
#
# Update to latest version:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#

services:
  app:
    image: ghcr.io/sammyaxel/securevault:latest
    container_name: securevault
    ports:
      - "3000:3000"
    volumes:
      - securevault-data:/app/data
      - securevault-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=/app/data/securevault.db
      - STORAGE_PATH=/app/uploads
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Optional: auto-update container when new image is pushed
  # Uncomment to enable automatic updates
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: watchtower
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     - WATCHTOWER_CLEANUP=true
  #     - WATCHTOWER_POLL_INTERVAL=3600
  #   restart: unless-stopped

volumes:
  securevault-data:
    driver: local
  securevault-uploads:
    driver: local
